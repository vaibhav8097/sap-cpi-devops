name: Deploy SAP CPI iFlow

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target Environment"
        required: true
        type: choice
        options:
          - DEV
          - TEST
          - PROD

      package:
        description: "Package ID"
        required: true

      iflow:
        description: "iFlow ID"
        required: true
jobs:
  deploy:

    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment }}
    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: pip install requests

      - name: Deploy iFlow
        env:
          PYTHONPATH: .
          BTP_CLIENT_ID: ${{ secrets.BTP_CLIENT_ID }}
          BTP_CLIENT_SECRET: ${{ secrets.BTP_CLIENT_SECRET }}
          BTP_TOKEN_URL: ${{ secrets.BTP_TOKEN_URL }}
          BTP_API_URL: ${{ secrets.BTP_API_URL }}
          IFLOW_ID: ${{ github.event.inputs.iflow }}
        run: |
          python scripts/deploy.py
      
      - name: Verify Deployment
        env:
          PYTHONPATH: .
          BTP_CLIENT_ID: ${{ secrets.BTP_CLIENT_ID }}
          BTP_CLIENT_SECRET: ${{ secrets.BTP_CLIENT_SECRET }}
          BTP_TOKEN_URL: ${{ secrets.BTP_TOKEN_URL }}
          BTP_API_URL: ${{ secrets.BTP_API_URL }}
          TASK_ID: ${{ env.TASK_ID }}
        run: |
          python scripts/check_deployment.py