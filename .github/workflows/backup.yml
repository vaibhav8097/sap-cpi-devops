name: Backup Integration Packages

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:

  backup:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Packages
        run: |
          pip install -r requirements.txt

      - name: Backup CPI Artifacts
        env:
          BTP_CLIENT_ID: ${{ secrets.BTP_CLIENT_ID }}
          BTP_CLIENT_SECRET: ${{ secrets.BTP_CLIENT_SECRET }}
          BTP_TOKEN_URL: ${{ secrets.BTP_TOKEN_URL }}
          BTP_API_URL: ${{ secrets.BTP_API_URL }}
        run: |
          python scripts/backup.py

      - name: Commit Backup

        run: |

          git config user.name "github-actions"

          git config user.email "github-actions@github.com"

          git add backup/

          git diff --cached --quiet || git commit -m "Daily CPI Backup"

          git push