name: SAP CPI Backup

on:
  workflow_dispatch:

  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  backup:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Backup
        env:
          BTP_CLIENT_ID: ${{ secrets.BTP_CLIENT_ID }}
          BTP_CLIENT_SECRET: ${{ secrets.BTP_CLIENT_SECRET }}
          BTP_TOKEN_URL: ${{ secrets.BTP_TOKEN_URL }}
          BTP_API_URL: ${{ secrets.BTP_API_URL }}
        run: |
          python scripts/backup.py

      - name: Commit Backup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add backup/

          if git diff --cached --quiet; then
            echo "No backup changes detected."
          else
            git commit -m "SAP CPI Backup - $(date '+%Y-%m-%d %H:%M:%S')"
            git push
          fi